  };
  const META = {
    egg:    {name:'神秘蛋',   rarity:0, tips:'使用满 7 天后孵化…'},
    bunny:  {name:'活力兔',   rarity:3, tips:'精力旺盛，干劲满满！'},
    cat:    {name:'淡然猫',   rarity:3, tips:'稳步前行，波澜不惊～'},
    bear:   {name:'踏实熊',   rarity:2, tips:'踏实为本，厚积薄发。'},
    fox:    {name:'智慧狐',   rarity:4, tips:'善用工具，运筹帷幄！'},
    dragon: {name:'迷你龙',   rarity:5, tips:'身为龙族，所向披靡！'},
    penguin:{name:'侦探企鹅', rarity:4, tips:'事无巨细，尽在掌握。'},
    hamster:{name:'贪睡仓鼠', rarity:3, tips:'……z z z……（什么？）'},
    ghost:  {name:'幽灵喵',   rarity:5, tips:'忽然出现，忽然消失~'},
    sloth:  {name:'慵懒树懒', rarity:2, tips:'慢…慢…慢慢…来……'},
  };

  /* ── 动画系统 (rAF) ───────────────────────────────── */
  let state     = {character:'egg',unlocked:false,show_pet:true,days_to_unlock:7,interactions:0};
  let animMode  = 'idle';
  let animStart = 0, actFr=0, lastFrT=0, rafId=null;
  let canvas, ctx, label, widget;

  const MODE_DUR = {idle:Infinity,pat:1200,play:1800,tickle:1600,easter:2800};
  const ACT_SPD  = {pat:200,play:160,tickle:140,easter:180};

  function tick(now){
    if(!ctx||!state.show_pet) return;
    rafId=requestAnimationFrame(tick);
    const elapsed=now-animStart, isAct=animMode!=='idle';
    if(isAct&&now-lastFrT>(ACT_SPD[animMode]||180)){ actFr=(actFr+1)%4; lastFrT=now; }
    if(isAct&&elapsed>MODE_DUR[animMode]) endAnim();
    ctx.clearRect(0,0,64,64);
    if(animMode==='easter'){
      ctx.fillStyle=`hsla(${(elapsed/8)%360},80%,60%,.12)`; ctx.fillRect(0,0,64,64);
    }
    if(state.character!=='egg') drawCushion(ctx,now);
    (DRAW[state.character]||DRAW.egg)(ctx,now,isAct,actFr);
  }
  function startAnim(){ cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick); }
  function endAnim(){ animMode='idle'; animStart=0; actFr=0; canvas&&canvas.classList.remove('easter'); updateTooltip(); }
  function triggerAnim(mode){
    if(Math.random()<.05){
      mode='easter'; canvas&&canvas.classList.add('easter');
      spawnParticles(['🌈','⭐','✨','🌟','💖'],8);
      const p=['神秘彩蛋！','你好特别！','今日锦鲤~','梦幻时刻！','★超级棒★'];
      notify('✨ '+p[Math.floor(Math.random()*p.length)],'success',2000);
    } else { canvas&&canvas.classList.remove('easter'); }
    animMode=mode; animStart=performance.now(); actFr=0; lastFrT=0;
  }

  /* ── 粒子特效 ─────────────────────────────────────── */
  function spawnParticles(emojis,count=5){
    if(!canvas) return;
    const rect=canvas.getBoundingClientRect();
    for(let i=0;i<count;i++){
      const el=document.createElement('span');
      el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      const dx=Math.random()*50-10, dy=-(42+Math.random()*28);
      el.style.cssText=`position:fixed;pointer-events:none;z-index:9999;font-size:.95rem;
        left:${rect.left+18+Math.random()*26}px;top:${rect.top-4}px;
        transition:transform .9s ease-out,opacity .9s;opacity:1;transform:translateY(0) scale(1);`;
      document.body.appendChild(el);
      requestAnimationFrame(()=>{
        el.style.transform=`translate(${dx}px,${dy}px) scale(1.4) rotate(${Math.random()*40-20}deg)`;
        el.style.opacity='0';
      });
      setTimeout(()=>el.remove(),950);
    }
  }

  /* ── 右键上下文菜单 ───────────────────────────────── */
  function showCtxMenu(e){
    e.preventDefault();
    document.querySelectorAll('.pet-ctx-menu').forEach(el=>el.remove());
    const menu=document.createElement('div');
    menu.className='pet-ctx-menu';
    const br=canvas.getBoundingClientRect();
    menu.style.cssText=`right:24px;bottom:${window.innerHeight-br.top+8}px;`;
    [{icon:'🤚',text:'摸摸头',mode:'pat'},{icon:'🎮',text:'逗一逗',mode:'play'},{icon:'🫸',text:'挠痒痒',mode:'tickle'}]
      .forEach(it=>{
        const d=document.createElement('div');
        d.className='pet-ctx-item'; d.textContent=it.icon+' '+it.text;
        d.onclick=()=>{ menu.remove(); triggerAnim(it.mode); doInteract(it.mode); };
        menu.appendChild(d);
      });
    document.body.appendChild(menu);
    setTimeout(()=>document.addEventListener('click',()=>menu.remove(),{once:true}),0);
  }

  /* ── 交互上报 ─────────────────────────────────────── */
  async function doInteract(mode){
    const pmap={pat:['❤️','💕'],play:['⭐','✨','🌟'],tickle:['😆','💦','〰️'],easter:['🌈','⭐','💖']};
    spawnParticles(pmap[mode]||['✨'],mode==='play'||mode==='easter'?6:4);
    try{
      const r=await fetch('/api/pet/interact',{method:'POST'});
      if(r.ok){const d=await r.json(); state.interactions=d.interactions;}
    }catch{}
    updateTooltip();
  }

  /* ── Tooltip ─────────────────────────────────────── */
  function updateTooltip(){
    const tip=document.getElementById('petTooltip'); if(!tip) return;
    const m=META[state.character]||META.egg;
    if(!state.unlocked){
      tip.innerHTML=`🥚 <b>神秘蛋</b><br>还需 <b>${state.days_to_unlock}</b> 天孵化<br><span style="opacity:.7;font-size:.7rem">坚持使用即可解锁</span>`;
    } else {
      const stars='★'.repeat(m.rarity)+'☆'.repeat(5-m.rarity);
      tip.innerHTML=`<b>${m.name}</b> <span style="color:#F4A832;font-size:.7rem">${stars}</span><br>${m.tips}<br><span style="opacity:.7;font-size:.7rem">已互动 ${state.interactions} 次</span>`;
    }
  }

  /* ── 加载 & 公开 API ─────────────────────────────── */
  async function load(){
    try{ const r=await fetch('/api/pet'); if(r.ok){const d=await r.json(); state={...state,...d};} }catch{}
    widget=document.getElementById('petWidget');
    canvas=document.getElementById('petCanvas');
    label =document.getElementById('petLabel');
    ctx   =canvas.getContext('2d');
    if(!state.show_pet){ widget.classList.add('hidden'); return; }
    const m=META[state.character]||META.egg;
    label.textContent=state.unlocked?m.name:'???';
    updateTooltip(); startAnim();
    canvas.addEventListener('click',      ()=>{triggerAnim('pat');  doInteract('pat');});
    canvas.addEventListener('dblclick',   e=>{e.preventDefault(); triggerAnim('play'); doInteract('play');});
    canvas.addEventListener('contextmenu',showCtxMenu);
  }
  function applyVisibility(show){
    state.show_pet=show;
    const w=document.getElementById('petWidget');
    if(w) w.classList.toggle('hidden',!show);
    if(show&&!rafId) load();
  }
  return {load, applyVisibility, getState:()=>state, META};
})();

/* ── 设置 ────────────────────────────────────────────── */
async function loadAppSettings() {
  try {
    const res = await fetch('/api/settings');
    if (res.ok) {
      appSettings = await res.json();
      updateAiButtonVisibility();
    }
  } catch {}
}

function updateAiButtonVisibility() {
  const btn = $('aiSuggestBtn');
  if (btn) btn.style.display = appSettings.ai_enabled ? '' : 'none';
}

function openSettings() {
  const petState = PET.getState();
  const overlay = document.createElement('div');
  overlay.className = 'settings-overlay';
  overlay.innerHTML = `
    <div class="settings-modal">
      <h3>⚙ 设置</h3>
      <div class="settings-section">桌面宠物</div>
      <div class="toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="stgShowPet" ${petState.show_pet ? 'checked' : ''} />
          <span class="toggle-slider"></span>
        </label>
        <label for="stgShowPet">显示桌面宠物</label>
      </div>
      <div class="settings-hint" id="petHint">${
        petState.unlocked
          ? `当前形态：${(PET.META[petState.character]||{name:'未知'}).name} · 已互动 ${petState.interactions} 次`
          : `🥚 使用满 7 天后孵化（还需约 ${petState.days_to_unlock} 天）`
      }</div>
      <div class="settings-section">AI 步骤建议</div>
      <div class="toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="stgAiEnabled" ${appSettings.ai_enabled ? 'checked' : ''} />
          <span class="toggle-slider"></span>
        </label>
        <label for="stgAiEnabled">启用 AI 步骤建议</label>
      </div>
      <div class="settings-row">
        <label>API 地址</label>
        <input type="text" id="stgBaseUrl" value="${appSettings.ai_base_url || 'https://api.openai.com/v1'}" placeholder="https://api.openai.com/v1" />
      </div>
      <div class="settings-hint">兼容 OpenAI 格式的接口地址，可填第三方代理或本地模型地址</div>
      <div class="settings-row">
        <label>API Key</label>
        <input type="password" id="stgApiKey" value="${appSettings.ai_api_key || ''}" placeholder="sk-…" autocomplete="off" />
      </div>
      <div class="settings-row">
        <label>模型名称</label>
        <input type="text" id="stgModel" value="${appSettings.ai_model || 'gpt-3.5-turbo'}" placeholder="gpt-3.5-turbo" />
      </div>
      <div class="settings-hint">例如：gpt-4o、claude-3-5-sonnet-20241022、deepseek-chat 等</div>
      <div class="settings-actions">
        <button class="btn-ghost" id="stgCancelBtn">取消</button>
        <button class="btn-primary" id="stgSaveBtn">保存</button>
      </div>
    </div>`;

  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#stgCancelBtn').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#stgSaveBtn').addEventListener('click', async () => {
    const showPet = overlay.querySelector('#stgShowPet').checked;
    // 保存宠物可见性
    try {
      await fetch('/api/pet/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ show_pet: showPet })
      });
      PET.applyVisibility(showPet);
    } catch {}

    const payload = {
      ai_enabled:  overlay.querySelector('#stgAiEnabled').checked,
      ai_base_url: overlay.querySelector('#stgBaseUrl').value.trim(),
      ai_api_key:  overlay.querySelector('#stgApiKey').value.trim(),
      ai_model:    overlay.querySelector('#stgModel').value.trim(),
    };
    try {
      const res = await fetch('/api/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      appSettings = { ...appSettings, ...payload };
      updateAiButtonVisibility();
      overlay.remove();
      notify('设置已保存', 'success', 2000);
    } catch (err) {
      notify('保存设置失败：' + err.message);
    }
  });

  document.body.appendChild(overlay);
  overlay.querySelector('#stgBaseUrl').focus();
}

/* ── AI 建议步骤 ─────────────────────────────────────── */
async function aiSuggestSteps() {
  const goal = addInput.value.trim();
  if (!goal) { notify('请先输入目标内容', 'warning'); addInput.focus(); return; }

  const panel = $('aiSuggestPanel');
  panel.classList.add('show');
  panel.innerHTML = '<div class="ai-loading"><span class="ai-spinner"></span>AI 正在分析目标，生成执行步骤…</div>';
  $('aiSuggestBtn').disabled = true;

  try {
    const res = await fetch('/api/ai/suggest-steps', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    pendingAiSteps = data.steps.map(text => ({ text, selected: true }));
    renderAiSuggestions();
  } catch (err) {
    panel.innerHTML = `<div class="ai-loading" style="color:var(--pri-high)">⚠ ${err.message}</div>`;
  } finally {
    $('aiSuggestBtn').disabled = false;
  }
}

function renderAiSuggestions() {
  const panel = $('aiSuggestPanel');
  if (!pendingAiSteps.length) { panel.classList.remove('show'); return; }

  panel.innerHTML = '';
  const title = document.createElement('div');
  title.className = 'ai-suggest-title';
  title.innerHTML = '<strong>✨ AI 建议步骤</strong><span>勾选后将随目标一起添加，可直接编辑文字</span>';
  panel.appendChild(title);

  pendingAiSteps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'ai-step-option';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'ai-step-cb'; cb.checked = step.selected;
    cb.addEventListener('change', () => { pendingAiSteps[i].selected = cb.checked; });

    const txt = document.createElement('input');
    txt.type = 'text'; txt.className = 'ai-step-text-input'; txt.value = step.text;
    txt.maxLength = 200;
    txt.addEventListener('input', () => { pendingAiSteps[i].text = txt.value; });

    row.append(cb, txt);
    panel.appendChild(row);
  });

  const actions = document.createElement('div');
  actions.className = 'ai-suggest-actions';

  const selectAll = document.createElement('button');
  selectAll.className = 'btn-ghost';
  selectAll.style.cssText = 'padding:4px 10px;font-size:.72rem;border-radius:12px';
  selectAll.textContent = '全选';
  selectAll.addEventListener('click', () => {
    pendingAiSteps.forEach(s => s.selected = true);
    renderAiSuggestions();
  });

  const clearBtn = document.createElement('button');
  clearBtn.className = 'btn-ghost';
  clearBtn.style.cssText = 'padding:4px 10px;font-size:.72rem;border-radius:12px';
  clearBtn.textContent = '清除';
  clearBtn.addEventListener('click', () => {
    pendingAiSteps = [];
    panel.classList.remove('show');
  });

  actions.append(selectAll, clearBtn);
  panel.appendChild(actions);
}

function clearAiPanel() {
  pendingAiSteps = [];
  const panel = $('aiSuggestPanel');
  if (panel) panel.classList.remove('show');
}

/* ── 主题 ─────────────────────────────────────────────── */
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  $('themeBtn').textContent = dark ? '☀️' : '🌙';
}
function toggleTheme() {
  const dark = !document.body.classList.contains('dark');
  applyTheme(dark);
  try { localStorage.setItem('theme', dark ? 'dark' : 'light'); } catch {}
}

/* ── 初始化 ──────────────────────────────────────────── */
(function init() {
  // 主题恢复
  try {
    const s = localStorage.getItem('theme');
    applyTheme(s === 'dark' || (!s && matchMedia('(prefers-color-scheme: dark)').matches));
  } catch { applyTheme(false); }

  // 优先级选择
  $('priSelect').addEventListener('click', e => {
    const dot = e.target.closest('.pri-dot');
    if (!dot) return;
    $('priSelect').querySelectorAll('.pri-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    selectedPri = dot.dataset.p;
  });

  // 添加
  addBtn.addEventListener('click', addTodo);
  addInput.addEventListener('keypress', e => e.key === 'Enter' && addTodo());
  $('clearDateBtn').addEventListener('click', () => { dueDateInput.value = ''; });

  // 搜索防抖（300ms）— 只绑定一次
  let debounce;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { searchQ = searchInput.value.trim(); render(); }, 300);
  });

  // 筛选标签
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      filter = tab.dataset.f;
      render();
    });
  });

  // 清除已完成
  $('clearDoneBtn').addEventListener('click', clearCompleted);
  $('exportBtn').addEventListener('click', exportTodos);
  $('themeBtn').addEventListener('click', toggleTheme);
  $('settingsBtn').addEventListener('click', openSettings);
  $('aiSuggestBtn').addEventListener('click', aiSuggestSteps);

  // 批量操作
  $('batchDone').addEventListener('click', async () => {
    const ids = [...selected];
    ids.forEach(id => { const t = allTodos.find(x => x.id === id); if (t) t.completed = true; });
    clearSelection();
    await Promise.all(ids.map(id => updateTodoApi(id, { completed: true })));
    notify(`已完成 ${ids.length} 条`, 'success');
  });
  $('batchDel').addEventListener('click', () => {
    const ids = [...selected];
    clearSelection();
    ids.forEach(id => deleteTodoWithUndo(id));
  });
  $('batchCancel').addEventListener('click', clearSelection);

  // 快速日期按钮
  document.querySelectorAll('.btn-date-quick').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = new Date();
      if (btn.dataset.d === 'today')     { /* d = today */ }
      else if (btn.dataset.d === 'tomorrow') d.setDate(d.getDate() + 1);
      else if (btn.dataset.d === 'next-week') d.setDate(d.getDate() + 7);
      dueDateInput.value = d.toISOString().slice(0, 10);
    });
  });

  // 备注切换
  $('toggleNotesBtn').addEventListener('click', () => {
    const row = $('notesRow');
    const open = row.classList.toggle('open');
    $('toggleNotesBtn').textContent = open ? '- 备注' : '+ 备注';
    if (open) $('notesInput').focus();
  });

  // 排序选项
  document.querySelectorAll('.sort-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      document.querySelectorAll('.sort-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      sortBy = opt.dataset.s;
      render();
    });
  });
  $('sortDirBtn').addEventListener('click', () => {
    sortAsc = !sortAsc;
    $('sortDirBtn').textContent = sortAsc ? '↑↓' : '↓↑';
    render();
  });

  // 键盘快捷键帮助
  function showHelp() {
    const overlay = document.createElement('div');
    overlay.className = 'shortcuts-overlay';
    overlay.innerHTML = `
      <div class="shortcuts-modal">
        <h3>⌨ 键盘快捷键</h3>
        <div class="shortcut-row"><span>添加待办</span><span class="kbd">Ctrl + Enter</span></div>
        <div class="shortcut-row"><span>清空输入框</span><span class="kbd">Esc</span></div>
        <div class="shortcut-row"><span>取消多选</span><span class="kbd">Esc</span></div>
        <div class="shortcut-row"><span>聚焦搜索框</span><span class="kbd">Ctrl + F</span></div>
        <div class="shortcut-row"><span>关闭此窗口</span><span class="kbd">Esc</span></div>
        <div class="shortcut-row"><span>显示帮助</span><span class="kbd">?</span></div>
        <div style="margin-top:14px;font-size:.75rem;color:var(--text2)">长按待办项可进入多选模式，双击文字可编辑</div>
        <button class="btn-ghost" style="margin-top:16px;width:100%" onclick="this.closest('.shortcuts-overlay').remove()">关闭</button>
      </div>`;
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }
  $('helpBtn').addEventListener('click', showHelp);

  // 全局键盘
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); addTodo(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault(); searchInput.focus(); searchInput.select();
    }
    if (e.key === 'Escape') {
      // 关闭弹窗（帮助 / 设置）
      const overlay = document.querySelector('.shortcuts-overlay, .settings-overlay');
      if (overlay) { overlay.remove(); return; }
      if (selected.size) clearSelection();
      else { addInput.value = ''; addInput.focus(); }
    }
    if (e.key === '?' && !e.ctrlKey && !e.metaKey &&
        document.activeElement.tagName !== 'INPUT' &&
        document.activeElement.tagName !== 'TEXTAREA') {
      showHelp();
    }
  });

  addInput.focus();
  loadTodos();
  loadAppSettings();
  PET.load();
})();
</script>
