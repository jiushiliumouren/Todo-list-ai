<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f5f0eb;
      --surface: #ffffff;
      --surface2: #f0ebe4;
      --border: #ddd6cc;
      --accent: #c0392b;
      --accent2: #e67e22;
      --text: #2c2318;
      --text2: #7a6e64;
      --radius: 4px;
      --shadow: 0 2px 12px rgba(44,35,24,.1);
      --pri-high: #e74c3c;
      --pri-mid:  #e67e22;
      --pri-low:  #3498db;
    }
    body.dark {
      --bg: #1a1714;
      --surface: #252220;
      --surface2: #2e2b28;
      --border: #3d3830;
      --text: #e8e0d5;
      --text2: #9e9488;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background .3s, color .3s;
    }
    .page { max-width: 700px; margin: 0 auto; padding: 48px 24px 100px; }

    /* ── 头部 ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 36px; border-bottom: 2px solid var(--accent);
      padding-bottom: 16px; gap: 12px;
    }
    .logo { font-size: 1.8rem; font-weight: 700; letter-spacing: -.02em; flex-shrink: 0; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* 进度环 */
    .progress-ring-wrap {
      display: flex; align-items: center; gap: 8px;
      font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--text2);
    }
    .ring { transform: rotate(-90deg); }
    .ring-bg  { fill: none; stroke: var(--border); stroke-width: 3; }
    .ring-fill {
      fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 88; stroke-dashoffset: 88;
      transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1);
    }

    /* ── 按钮 ── */
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem; font-weight: 600; letter-spacing: .04em;
      border: 1.5px solid transparent; border-radius: var(--radius);
      cursor: pointer; padding: 8px 14px; transition: all .15s; background: none;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-ghost { color: var(--text2); border-color: var(--border); background: var(--surface); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { color: #e74c3c; border-color: var(--border); background: var(--surface); }
    .btn-danger:hover { border-color: #e74c3c; }
    .btn-icon {
      width: 34px; height: 34px; padding: 0; font-size: .95rem;
      border-color: var(--border); background: var(--surface);
      color: var(--text2); border-radius: 50%;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 筛选标签 ── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
    .filter-tab {
      padding: 5px 14px; font-size: .73rem;
      border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text2);
      cursor: pointer; transition: all .15s;
      font-family: 'JetBrains Mono', monospace; font-weight: 600;
    }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-tab:not(.active):hover { border-color: var(--accent); color: var(--accent); }

    /* ── 添加卡片 ── */
    .add-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
      transition: border-color .2s;
    }
    .add-card:focus-within { border-color: var(--accent); }
    .add-main-row { display: flex; gap: 10px; margin-bottom: 10px; }
    .add-main-row input { flex: 1; }
    .add-meta-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .add-meta-row label {
      font-size: .73rem; color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="text"], input[type="date"] {
      font-family: 'Noto Serif SC', serif; font-size: .92rem;
      padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--surface); color: var(--text);
      transition: border-color .2s; width: 100%;
    }
    input[type="date"] {
      font-family: 'JetBrains Mono', monospace; font-size: .8rem;
      width: auto; color-scheme: light dark;
    }
    input:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--text2); }

    /* 优先级选择器 */
    .pri-select { display: flex; gap: 5px; align-items: center; }
    .pri-dot {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .65rem; font-weight: 700; color: #fff;
      transition: transform .15s, border-color .15s;
      font-family: 'JetBrains Mono', monospace;
    }
    .pri-dot:hover { transform: scale(1.12); }
    .pri-dot.selected { border-color: var(--text); transform: scale(1.18); }
    .pri-dot[data-p="high"] { background: var(--pri-high); }
    .pri-dot[data-p="mid"]  { background: var(--pri-mid); }
    .pri-dot[data-p="low"]  { background: var(--pri-low); }

    /* ── 工具栏 ── */
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type="text"] { flex: 1; min-width: 140px; font-size: .85rem; }
    .toolbar-right { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }

    /* ── 统计 ── */
    .stats {
      display: flex; background: var(--surface2);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      margin-bottom: 20px; overflow: hidden;
      font-family: 'JetBrains Mono', monospace; font-size: .75rem;
    }
    .stat { flex: 1; padding: 10px 8px; text-align: center; }
    .stat + .stat { border-left: 1.5px solid var(--border); }
    .stat-num {
      font-size: 1.3rem; font-weight: 600; display: block;
      color: var(--accent); transition: transform .2s;
    }
    .stat-label { color: var(--text2); }

    /* ── 通知 ── */
    .notice {
      padding: 10px 14px; border-radius: var(--radius);
      font-size: .82rem; margin-bottom: 10px; border: 1.5px solid;
      animation: slideDown .2s ease; display: flex;
      align-items: center; justify-content: space-between; gap: 10px;
    }
    .notice .nx { cursor: pointer; opacity: .6; }
    .notice.error   { background: #fdf2f2; border-color: #e74c3c; color: #c0392b; }
    .notice.warning { background: #fef9ec; border-color: #f39c12; color: #856404; }
    .notice.success { background: #edfaf3; border-color: #27ae60; color: #1e8449; }
    body.dark .notice.error   { background: #2d1212; }
    body.dark .notice.warning { background: #2d2210; }
    body.dark .notice.success { background: #0f2d1a; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; } }

    .result-tag {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem;
      color: var(--text2); margin-bottom: 10px; padding: 5px 10px;
      border-left: 3px solid var(--accent2); background: var(--surface2);
    }

    /* ── Todo 列表 ── */
    .todo-list { list-style: none; }
    .todo-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 16px; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius);
      margin-bottom: 8px; position: relative;
      transition: border-color .15s, transform .15s, opacity .25s, box-shadow .15s;
      animation: fadeIn .22s ease; cursor: grab;
    }
    .todo-item:active { cursor: grabbing; }
    .todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(192,57,43,.15); }
    .todo-item.dragging  { opacity: .35; transform: scale(.98); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; } }
    .todo-item:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .todo-item.done { opacity: .55; background: var(--surface2); }
    .todo-item.multi-sel { outline: 2px solid var(--accent); }

    /* 优先级侧条 */
    .pri-bar {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .pri-bar.high { background: var(--pri-high); }
    .pri-bar.mid  { background: var(--pri-mid); }
    .pri-bar.low  { background: var(--pri-low); }

    /* 复选框 */
    .cb-wrap { position: relative; flex-shrink: 0; margin-top: 2px; }
    .cb-wrap input[type="checkbox"] { position: absolute; opacity:0; width:0; height:0; }
    .cb-box {
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border: 1.5px solid var(--border);
      border-radius: 3px; cursor: pointer; transition: all .15s;
      background: var(--surface); flex-shrink: 0;
    }
    .cb-box::after { content:'✓'; display:none; color:#fff; font-size:.8rem; font-weight:700; }
    .cb-wrap input:checked + .cb-box { background: var(--accent); border-color: var(--accent); }
    .cb-wrap input:checked + .cb-box::after { display: block; }

    /* 内容 */
    .todo-body { flex: 1; min-width: 0; }
    .todo-text {
      font-size: .95rem; line-height: 1.5; word-break: break-word;
      cursor: pointer; display: block;
    }
    .todo-text:hover { color: var(--accent); }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text2); }

    .todo-meta { display: flex; gap: 7px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
    .meta-badge {
      font-family: 'JetBrains Mono', monospace; font-size: .67rem;
      padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border);
      color: var(--text2); background: var(--surface2);
    }
    .meta-badge.overdue  { border-color: var(--pri-high); color: var(--pri-high); background: #fdf2f2; }
    .meta-badge.due-soon { border-color: var(--pri-mid);  color: var(--pri-mid); }
    body.dark .meta-badge.overdue { background: #2d1212; }
    .pri-chip {
      font-family: 'JetBrains Mono', monospace; font-size: .65rem;
      padding: 2px 7px; border-radius: 10px; color: #fff; font-weight: 600;
    }
    .pri-chip.high { background: var(--pri-high); }
    .pri-chip.mid  { background: var(--pri-mid); }
    .pri-chip.low  { background: var(--pri-low); }

    /* 行内编辑 */
    .edit-input {
      font-family: 'Noto Serif SC', serif; font-size: .92rem;
      padding: 3px 8px; border: 1.5px solid var(--accent);
      border-radius: var(--radius); background: var(--surface);
      color: var(--text); width: 100%;
    }
    .edit-input:focus { outline: none; }

    /* 删除按钮 */
    .item-actions { display: flex; gap: 4px; flex-shrink: 0; margin-top: 1px; }
    .del-btn {
      padding: 4px 10px; font-size: .7rem;
      color: var(--text2); border-color: transparent;
      background: none; opacity: 0; transition: opacity .15s, color .15s;
    }
    .todo-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #e74c3c; border-color: #e74c3c; background: none; }

    /* ── 空态 ── */
    .empty { text-align: center; padding: 60px 0; color: var(--text2); font-size: .92rem; }
    .empty-icon { font-size: 2.4rem; display: block; margin-bottom: 12px; }

    /* 加载条 */
    .loading-bar {
      height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px; margin-bottom: 12px; display: none;
      animation: loadPulse 1s ease-in-out infinite;
    }
    .loading-bar.active { display: block; }
    @keyframes loadPulse { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* ── 批量操作浮动栏 ── */
    .batch-bar {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 40px; padding: 10px 20px;
      display: flex; gap: 10px; align-items: center;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; z-index: 100;
      font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--text2);
    }
    .batch-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: all; }
    .batch-divider { width: 1px; height: 20px; background: var(--border); }

    @media (max-width: 520px) {
      .page { padding: 28px 14px 80px; }
      .add-meta-row { flex-direction: column; align-items: flex-start; }
      .toolbar { flex-direction: column; }
      .toolbar-right { margin-left: 0; }
      .stat-num { font-size: 1.1rem; }
    }

    /* ── 日期快捷键 ── */
    .date-shortcuts { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn-date-quick {
      padding: 4px 10px; font-size: .7rem; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--surface2);
      color: var(--text2); cursor: pointer; font-family: 'JetBrains Mono', monospace;
      font-weight: 600; transition: all .15s;
    }
    .btn-date-quick:hover { border-color: var(--accent2); color: var(--accent2); background: var(--surface); }

    /* ── 备注区 ── */
    .notes-row { display: none; margin-top: 8px; }
    .notes-row.open { display: block; }
    .notes-textarea {
      width: 100%; min-height: 64px; resize: vertical;
      font-family: 'Noto Serif SC', serif; font-size: .85rem;
      padding: 8px 10px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--surface); color: var(--text);
      transition: border-color .2s;
    }
    .notes-textarea:focus { outline: none; border-color: var(--accent); }
    .btn-toggle-notes {
      padding: 4px 10px; font-size: .72rem; border-radius: 12px;
      border: 1.5px dashed var(--border); background: none;
      color: var(--text2); cursor: pointer; font-family: 'JetBrains Mono', monospace;
      font-weight: 600; transition: all .15s;
    }
    .btn-toggle-notes:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 标签 ── */
    .tags-input-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex: 1; }
    .tags-input {
      font-family: 'JetBrains Mono', monospace; font-size: .78rem;
      padding: 5px 9px; border: 1.5px solid var(--border);
      border-radius: 12px; background: var(--surface); color: var(--text);
      min-width: 100px; width: auto; transition: border-color .2s;
    }
    .tags-input:focus { outline: none; border-color: var(--accent); }
    .tag-chip {
      font-family: 'JetBrains Mono', monospace; font-size: .63rem; font-weight: 700;
      padding: 2px 8px; border-radius: 10px;
      background: var(--surface2); border: 1.5px solid var(--border);
      color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .tag-chip:hover, .tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── AI 建议步骤面板 ── */
    .ai-suggest-panel {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-top: 2px solid var(--accent2);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px;
      animation: slideDown .2s ease; display: none;
    }
    .ai-suggest-panel.show { display: block; }
    .ai-suggest-title {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem;
      color: var(--text2); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .ai-suggest-title strong { color: var(--accent2); }
    .ai-step-option {
      display: flex; align-items: center; gap: 8px; padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .ai-step-option:last-of-type { border-bottom: none; }
    .ai-step-cb {
      width: 14px; height: 14px; accent-color: var(--accent2);
      cursor: pointer; flex-shrink: 0;
    }
    .ai-step-text-input {
      flex: 1; font-family: 'Noto Serif SC', serif; font-size: .85rem;
      color: var(--text); background: transparent; border: none;
      padding: 2px 5px; border-radius: 3px; transition: background .15s, outline .15s;
    }
    .ai-step-text-input:focus { outline: 1.5px solid var(--accent2); background: var(--surface); }
    .ai-suggest-actions {
      margin-top: 8px; display: flex; gap: 8px; align-items: center;
    }
    .ai-loading {
      font-family: 'JetBrains Mono', monospace; font-size: .8rem;
      color: var(--text2); padding: 8px 0; text-align: center;
    }
    @keyframes aiSpin {
      to { transform: rotate(360deg); }
    }
    .ai-spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--border); border-top-color: var(--accent2);
      border-radius: 50%; animation: aiSpin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    /* ── 设置弹窗 ── */
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeOverlay .15s ease;
    }
    .settings-modal {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 24px 28px; width: 460px; max-width: 96vw;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
    }
    .settings-modal h3 { font-size: 1rem; margin-bottom: 20px; color: var(--text); }
    .settings-section {
      font-family: 'JetBrains Mono', monospace; font-size: .68rem;
      color: var(--text2); text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 10px; margin-top: 16px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .settings-section:first-of-type { margin-top: 0; }
    .settings-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .settings-row label {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem;
      color: var(--text2); width: 76px; flex-shrink: 0;
    }
    .settings-row input[type="text"],
    .settings-row input[type="password"] {
      flex: 1; font-size: .85rem; padding: 7px 10px;
    }
    .settings-hint {
      font-family: 'JetBrains Mono', monospace; font-size: .68rem;
      color: var(--text2); margin: -4px 0 10px 86px; line-height: 1.5;
    }
    .toggle-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .toggle-row label {
      font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: var(--text);
    }
    .toggle-switch {
      position: relative; width: 38px; height: 20px; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 20px; cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; width: 14px; height: 14px;
      left: 3px; top: 3px; background: #fff; border-radius: 50%;
      transition: transform .2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }
    .settings-actions {
      display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
    }

    /* ── 排序栏 ── */
    .sort-bar {
      display: flex; align-items: center; gap: 6px; margin-bottom: 14px;
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; flex-wrap: wrap;
    }
    .sort-label { color: var(--text2); flex-shrink: 0; }
    .sort-opt {
      padding: 4px 12px; border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text2); cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: .72rem; font-weight: 600;
      transition: all .15s;
    }
    .sort-opt.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .sort-opt:not(.active):hover { border-color: var(--accent); color: var(--accent); }
    .sort-dir {
      padding: 4px 8px; border-radius: 12px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text2); cursor: pointer;
      font-size: .8rem; transition: all .15s; margin-left: auto;
    }
    .sort-dir:hover { border-color: var(--accent); color: var(--accent); }

    /* ── todo 备注展示 ── */
    .todo-notes {
      font-size: .8rem; color: var(--text2); line-height: 1.5;
      margin-top: 5px; padding: 6px 8px; border-left: 2px solid var(--border);
      background: var(--surface2); border-radius: 0 var(--radius) var(--radius) 0;
      white-space: pre-wrap; word-break: break-word;
      display: none;
    }
    .todo-notes.show { display: block; }
    .notes-toggle-btn {
      background: none; border: none; padding: 2px 6px; font-size: .68rem;
      color: var(--text2); cursor: pointer; font-family: 'JetBrains Mono', monospace;
      border-radius: 8px; opacity: .7; transition: opacity .15s, color .15s;
    }
    .notes-toggle-btn:hover { opacity: 1; color: var(--accent); }

    /* ── 分步走 ── */
    .steps-toggle-row {
      display: flex; align-items: center; gap: 7px;
      margin-top: 7px; padding-top: 7px;
      border-top: 1px dashed var(--border);
    }
    .steps-toggle-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1.5px solid var(--border);
      border-radius: 12px; padding: 3px 10px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: .68rem; font-weight: 700;
      color: var(--text2); transition: all .15s; flex-shrink: 0;
      letter-spacing: .03em;
    }
    .steps-toggle-btn:hover   { border-color: var(--accent2); color: var(--accent2); }
    .steps-toggle-btn.open    { border-color: var(--accent2); color: var(--accent2);
                                 background: color-mix(in srgb, var(--accent2) 8%, transparent); }
    .steps-toggle-btn .arrow  { font-size: .6rem; transition: transform .2s; display: inline-block; }
    .steps-toggle-btn.open .arrow { transform: rotate(90deg); }

    /* 进度环（迷你版） */
    .mini-ring-wrap {
      display: flex; align-items: center; gap: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: .68rem;
      color: var(--text2); margin-left: auto; flex-shrink: 0;
    }
    .mini-ring-svg { transform: rotate(-90deg); flex-shrink: 0; }
    .mini-ring-bg   { fill: none; stroke: var(--border); stroke-width: 3; }
    .mini-ring-fill {
      fill: none; stroke: var(--accent2); stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 51; stroke-dashoffset: 51;
      transition: stroke-dashoffset .5s cubic-bezier(.4,0,.2,1), stroke .3s;
    }
    .mini-ring-fill.done { stroke: #27ae60; }
    .mini-ring-label { font-weight: 700; }
    .mini-ring-label.done { color: #27ae60; }

    /* 步骤面板 */
    .steps-panel {
      display: none; margin-top: 8px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      background: var(--surface2); overflow: hidden;
      animation: fadeIn .18s ease;
    }
    .steps-panel.open { display: block; }

    .step-list { padding: 6px 0; }
    .step-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 12px; transition: background .12s;
    }
    .step-item:hover { background: var(--surface); }

    /* 步骤复选框 */
    .step-cb-wrap { flex-shrink: 0; margin-top: 1px; }
    .step-cb-wrap input[type="checkbox"] { display: none; }
    .step-cb-box {
      width: 16px; height: 16px; border: 1.5px solid var(--border);
      border-radius: 50%; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all .15s;
      background: var(--surface);
    }
    .step-cb-box::after { content:'✓'; display:none; color:#fff; font-size:.6rem; font-weight:700; }
    .step-cb-wrap input:checked + .step-cb-box {
      background: #27ae60; border-color: #27ae60;
    }
    .step-cb-wrap input:checked + .step-cb-box::after { display: flex; }

    .step-body { flex: 1; min-width: 0; }
    .step-text {
      font-size: .83rem; line-height: 1.4; color: var(--text);
      cursor: pointer; display: block; word-break: break-word;
    }
    .step-text:hover { color: var(--accent); }
    .step-item.done .step-text { text-decoration: line-through; color: var(--text2); }
    .step-due {
      font-family: 'JetBrains Mono', monospace; font-size: .63rem;
      color: var(--text2); margin-top: 2px; display: inline-block;
    }
    .step-due.overdue { color: var(--pri-high); }
    .step-due.due-soon { color: var(--pri-mid); }

    /* 步骤编辑输入框 */
    .step-edit-input {
      font-family: 'Noto Serif SC', serif; font-size: .83rem;
      padding: 2px 6px; border: 1.5px solid var(--accent);
      border-radius: var(--radius); background: var(--surface);
      color: var(--text); width: 100%;
    }
    .step-edit-input:focus { outline: none; }

    /* 步骤删除按钮 */
    .step-del-btn {
      flex-shrink: 0; background: none; border: none; padding: 2px 6px;
      font-size: .7rem; color: var(--text2); cursor: pointer;
      opacity: 0; transition: opacity .15s, color .15s; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .step-item:hover .step-del-btn { opacity: 1; }
    .step-del-btn:hover { color: #e74c3c; }

    /* 步骤添加表单 */
    .step-add-form {
      display: flex; gap: 6px; align-items: center;
      padding: 8px 12px; border-top: 1px solid var(--border);
      flex-wrap: wrap; background: var(--surface);
    }
    .step-add-input {
      flex: 1; min-width: 100px;
      font-family: 'Noto Serif SC', serif; font-size: .83rem;
      padding: 5px 9px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--surface2); color: var(--text);
      transition: border-color .2s;
    }
    .step-add-input:focus { outline: none; border-color: var(--accent2); }
    .step-add-date {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem;
      padding: 5px 8px; border: 1.5px solid var(--border);
      border-radius: var(--radius); background: var(--surface2); color: var(--text);
      width: 126px; color-scheme: light dark; transition: border-color .2s;
    }
    .step-add-date:focus { outline: none; border-color: var(--accent2); }
    .step-add-btn {
      padding: 5px 12px; font-size: .72rem; font-weight: 700;
      border-radius: var(--radius); border: 1.5px solid var(--accent2);
      background: var(--accent2); color: #fff; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; transition: filter .15s, transform .15s;
      flex-shrink: 0;
    }
    .step-add-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .step-add-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .step-empty {
      text-align: center; padding: 12px; color: var(--text2);
      font-size: .78rem; font-family: 'JetBrains Mono', monospace;
    }

    /* ── 键盘快捷键帮助弹窗 ── */
    .shortcuts-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; animation: fadeOverlay .15s ease;
    }
    @keyframes fadeOverlay { from { opacity:0; } to { opacity:1; } }
    .shortcuts-modal {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 8px; padding: 24px 28px; min-width: 300px; max-width: 440px;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
    }
    /* ── 虚拟宠物 ── */
    #petWidget {
      position: fixed; bottom: 24px; right: 24px; z-index: 900;
      display: flex; flex-direction: column; align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 16px 16px 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      user-select: none;
      transition: box-shadow .25s;
    }
    #petWidget:hover {
      box-shadow: 0 12px 44px rgba(0,0,0,.14);
    }
    #petWidget.hidden { display: none; }
    #petCanvas {
      cursor: pointer;
      width: 96px; height: 96px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,.12));
      transition: transform .28s cubic-bezier(.34,1.56,.64,1),
                  filter .25s;
    }
    #petCanvas:hover {
      transform: translateY(-5px) scale(1.08);
      filter: drop-shadow(0 12px 28px rgba(0,0,0,.18));
    }
    #petCanvas:active { transform: scale(.93); }
    #petLabel {
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      color: var(--text2);
      margin-top: 8px;
      letter-spacing: .3px;
    }
    #petTooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 14px; min-width: 160px;
      font-size: .75rem; line-height: 1.8; color: var(--text);
      box-shadow: 0 8px 28px rgba(0,0,0,.12); pointer-events: none;
      opacity: 0;
      transform: translateX(-50%) translateY(6px);
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
    }
    #petWidget:hover #petTooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* ── 宠物右键菜单 ── */
    .pet-ctx-menu {
      position: fixed; z-index: 9000;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 4px; min-width: 120px;
      box-shadow: 0 8px 28px rgba(0,0,0,.18); font-size: .8rem;
      overflow: hidden;
    }
    .pet-ctx-item {
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      color: var(--text); transition: background .12s;
    }
    .pet-ctx-item:hover { background: var(--surface2); }
    /* ── 彩蛋光晕动画 ── */
    @keyframes petRainbow {
      0%   { filter: drop-shadow(0 0 12px #ff6b6b); }
      20%  { filter: drop-shadow(0 0 12px #ffd93d); }
      40%  { filter: drop-shadow(0 0 12px #6bcb77); }
      60%  { filter: drop-shadow(0 0 12px #4d96ff); }
      80%  { filter: drop-shadow(0 0 12px #c77dff); }
      100% { filter: drop-shadow(0 0 12px #ff6b6b); }
    }
    #petCanvas.easter { animation: petRainbow .6s infinite; }

    .shortcuts-modal h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text); }
    .shortcut-row { display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .82rem; color: var(--text2); }
    .shortcut-row:last-child { border-bottom: none; }
    .kbd {
      background: var(--surface2); border: 1.5px solid var(--border);
      border-radius: 4px; padding: 2px 7px; font-family: 'JetBrains Mono', monospace;
      font-size: .75rem; color: var(--text);
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">待办<span>·</span>清单</div>
    <div class="header-actions">
      <div class="progress-ring-wrap">
        <svg width="32" height="32" class="ring" viewBox="0 0 32 32">
          <circle class="ring-bg"  cx="16" cy="16" r="14"/>
          <circle class="ring-fill" id="ringFill" cx="16" cy="16" r="14"/>
        </svg>
        <span id="ringPct">0%</span>
      </div>
      <button class="btn-icon" id="themeBtn" title="切换主题">🌙</button>
      <button class="btn-icon" id="helpBtn" title="键盘快捷键 (?)">⌨</button>
      <button class="btn-icon" id="settingsBtn" title="设置">⚙</button>
      <button class="btn-ghost" id="exportBtn">导出</button>
    </div>
  </header>

  <div id="noticeArea"></div>
  <div class="loading-bar" id="loadingBar"></div>

  <!-- 添加卡片 -->
  <div class="add-card">
    <div class="add-main-row">
      <input type="text" id="addInput" placeholder="输入新的待办事项…" autocomplete="off" />
      <button class="btn-ghost" id="aiSuggestBtn" title="AI 自动生成执行步骤" style="display:none;flex-shrink:0">✨ AI 建议</button>
      <button class="btn-primary" id="addBtn">添加</button>
    </div>
    <div class="add-meta-row">
      <label>优先级</label>
      <div class="pri-select" id="priSelect">
        <div class="pri-dot" data-p="high" title="高">高</div>
        <div class="pri-dot selected" data-p="mid" title="中">中</div>
        <div class="pri-dot" data-p="low" title="低">低</div>
      </div>
      <label>截止日期</label>
      <input type="date" id="dueDateInput" />
      <div class="date-shortcuts">
        <button class="btn-date-quick" data-d="today">今天</button>
        <button class="btn-date-quick" data-d="tomorrow">明天</button>
        <button class="btn-date-quick" data-d="next-week">下周</button>
      </div>
      <button class="btn-ghost" id="clearDateBtn" style="padding:5px 10px;font-size:.72rem">清除</button>
    </div>
    <div class="add-meta-row" style="margin-top:6px">
      <label>标签</label>
      <input type="text" class="tags-input" id="tagsInput" placeholder="用空格分隔，如：工作 重要" autocomplete="off" />
      <button class="btn-toggle-notes" id="toggleNotesBtn">+ 备注</button>
    </div>
    <div class="notes-row" id="notesRow">
      <textarea class="notes-textarea" id="notesInput" placeholder="添加备注说明…" maxlength="2000"></textarea>
    </div>
  </div>

  <!-- AI 建议步骤面板 -->
  <div class="ai-suggest-panel" id="aiSuggestPanel"></div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索待办事项…" autocomplete="off" />
    <div class="toolbar-right">
      <button class="btn-danger" id="clearDoneBtn">清除已完成</button>
    </div>
  </div>

  <!-- 筛选标签 -->
  <div class="filter-bar">
    <div class="filter-tab active" data-f="all">全部</div>
    <div class="filter-tab" data-f="pending">待处理</div>
    <div class="filter-tab" data-f="done">已完成</div>
    <div class="filter-tab" data-f="high">🔴 高优先</div>
    <div class="filter-tab" data-f="overdue">⏰ 已逾期</div>
  </div>

  <!-- 排序栏 -->
  <div class="sort-bar" id="sortBar">
    <span class="sort-label">排序：</span>
    <div class="sort-opt active" data-s="priority">优先级</div>
    <div class="sort-opt" data-s="dueDate">截止日期</div>
    <div class="sort-opt" data-s="name">名称</div>
    <div class="sort-opt" data-s="created">添加顺序</div>
    <span class="sort-dir" id="sortDirBtn" title="切换升降序">↑↓</span>
  </div>

  <!-- 标签过滤行（动态渲染）-->
  <div class="filter-bar" id="tagFilterBar" style="display:none"></div>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">全部</span></div>
    <div class="stat"><span class="stat-num" id="statDone">0</span><span class="stat-label">已完成</span></div>
    <div class="stat"><span class="stat-num" id="statPending">0</span><span class="stat-label">待处理</span></div>
    <div class="stat"><span class="stat-num" id="statOverdue">0</span><span class="stat-label">已逾期</span></div>
  </div>

  <div class="result-tag" id="resultTag" style="display:none"></div>

  <ul class="todo-list" id="todoList"></ul>
</div>

<!-- 批量操作浮动栏 -->
<div class="batch-bar" id="batchBar">
  <span id="batchLabel">已选 0 项</span>
  <div class="batch-divider"></div>
  <button class="btn-ghost" id="batchDone" style="border-radius:20px;padding:6px 14px">标记完成</button>
  <button class="btn-danger" id="batchDel"  style="border-radius:20px;padding:6px 14px">批量删除</button>
  <button class="btn-ghost" id="batchCancel" style="border-radius:20px;padding:6px 14px">取消</button>
</div>

<!-- 虚拟宠物组件 -->
<div id="petWidget">
  <div id="petTooltip"></div>
  <canvas id="petCanvas" width="64" height="64" title="左键拍拍 · 双击逗逗 · 右键更多"></canvas>
  <div id="petLabel">…</div>
</div>

<script>
'use strict';

const API = '/api/todos';

/* ── 全局状态 ─────────────────────────────────────────── */
let allTodos    = [];
let filter      = 'all';
let searchQ     = '';
let selectedPri = 'mid';
let selected    = new Set();
let dragSrc     = null;
let sortBy      = 'priority';
let sortAsc     = true;
let tagFilter   = '';
const pendingDeletes = new Map(); // id -> { todo, timer }
const openSteps = new Set();      // 已展开"分步走"面板的 todo id
let appSettings = { ai_enabled: false, ai_base_url: '', ai_api_key: '', ai_model: '' };
let pendingAiSteps = []; // [{ text, selected }]

/* ── DOM ─────────────────────────────────────────────── */
const $         = id => document.getElementById(id);
const addInput  = $('addInput');
const addBtn    = $('addBtn');
const dueDateInput = $('dueDateInput');
const searchInput  = $('searchInput');
const todoList  = $('todoList');
const loadingBar = $('loadingBar');
const noticeArea = $('noticeArea');
const resultTag  = $('resultTag');
const statTotal  = $('statTotal');
const statDone   = $('statDone');
const statPending= $('statPending');
const statOverdue= $('statOverdue');
const ringFill   = $('ringFill');
const ringPct    = $('ringPct');
const batchBar   = $('batchBar');
const batchLabel = $('batchLabel');

/* ── 工具函数 ─────────────────────────────────────────── */
function notify(msg, type = 'error', ms = 3500) {
  const d = document.createElement('div');
  d.className = `notice ${type}`;
  d.innerHTML = `<span>${msg}</span><span class="nx">✕</span>`;
  d.querySelector('.nx').onclick = () => d.remove();
  noticeArea.prepend(d);
  setTimeout(() => { d.style.transition='opacity .4s'; d.style.opacity='0'; setTimeout(()=>d.remove(),400); }, ms);
}

function setLoading(v) {
  loadingBar.classList.toggle('active', v);
  addBtn.disabled = v;
  addBtn.textContent = v ? '添加中…' : '添加';
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function isOverdue(t) { return t.due_date && !t.completed && t.due_date < todayStr(); }
function isDueSoon(t) {
  if (!t.due_date || t.completed) return false;
  const diff = (new Date(t.due_date) - new Date(todayStr())) / 86400000;
  return diff >= 0 && diff <= 2;
}

/* ── 过滤 + 排序 ─────────────────────────────────────── */
function getVisible() {
  let list = allTodos.slice();
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(t => t.text.toLowerCase().includes(q) ||
      (t.notes || '').toLowerCase().includes(q) ||
      (t.tags || []).some(tag => tag.toLowerCase().includes(q)));
  }
  if (filter === 'pending') list = list.filter(t => !t.completed);
  if (filter === 'done')    list = list.filter(t => t.completed);
  if (filter === 'high')    list = list.filter(t => t.priority === 'high');
  if (filter === 'overdue') list = list.filter(t => isOverdue(t));
  if (tagFilter)            list = list.filter(t => (t.tags || []).includes(tagFilter));

  const priW = { high:0, mid:1, low:2 };
  const dir = sortAsc ? 1 : -1;

  list.sort((a, b) => {
    // 未完成在前
    if (a.completed !== b.completed) return a.completed ? 1 : -1;

    let cmp = 0;
    if (sortBy === 'priority') {
      const pa = priW[a.priority] ?? 1, pb = priW[b.priority] ?? 1;
      cmp = pa - pb;
      if (cmp === 0) {
        if (a.due_date && b.due_date) cmp = a.due_date.localeCompare(b.due_date);
        else if (a.due_date) cmp = -1;
        else if (b.due_date) cmp = 1;
      }
    } else if (sortBy === 'dueDate') {
      if (a.due_date && b.due_date) cmp = a.due_date.localeCompare(b.due_date);
      else if (a.due_date) cmp = -1;
      else if (b.due_date) cmp = 1;
      else cmp = 0;
    } else if (sortBy === 'name') {
      cmp = a.text.localeCompare(b.text, 'zh-CN');
    } else if (sortBy === 'created') {
      cmp = a.id - b.id;
    }
    return cmp * dir;
  });
  return list;
}

/* ── 渲染 ─────────────────────────────────────────────── */
function render() {
  const visible = getVisible();
  todoList.innerHTML = '';

  // 统计（全量）
  const total   = allTodos.length;
  const done    = allTodos.filter(t => t.completed).length;
  const overdue = allTodos.filter(t => isOverdue(t)).length;
  animateStat(statTotal,   total);
  animateStat(statDone,    done);
  animateStat(statPending, total - done);
  animateStat(statOverdue, overdue);

  // 进度环（circumference ≈ 88）
  const pct = total ? Math.round(done / total * 100) : 0;
  ringFill.style.strokeDashoffset = 88 - (88 * pct / 100);
  ringPct.textContent = pct + '%';

  // 结果标签
  const hasFilter = filter !== 'all' || searchQ;
  if (hasFilter) {
    const lbl = { all:'全部', pending:'待处理', done:'已完成', high:'高优先级', overdue:'已逾期' };
    resultTag.textContent = `筛选：${lbl[filter]||filter}${searchQ?' · 搜索"'+searchQ+'"':''} — 共 ${visible.length} 条`;
    resultTag.style.display = 'block';
  } else {
    resultTag.style.display = 'none';
  }

  // 空态
  if (!visible.length) {
    todoList.innerHTML = `<div class="empty"><span class="empty-icon">📋</span>${hasFilter?'没有符合条件的待办事项':'暂无待办事项，添加一个吧！'}</div>`;
    updateBatchBar();
    return;
  }

  const frag = document.createDocumentFragment();
  for (const todo of visible) {
    const li = document.createElement('li');
    li.className = `todo-item${todo.completed?' done':''}${selected.has(todo.id)?' multi-sel':''}`;
    li.dataset.id = todo.id;
    li.draggable = true;

    // 优先级侧条
    const bar = document.createElement('div');
    bar.className = `pri-bar ${todo.priority || 'mid'}`;
    li.appendChild(bar);

    // 完成复选框
    const cbWrap = document.createElement('label');
    cbWrap.className = 'cb-wrap';
    cbWrap.title = todo.completed ? '标记为未完成' : '标记为完成';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = todo.completed;
    const cbBox = document.createElement('span');
    cbBox.className = 'cb-box';
    cbWrap.append(cb, cbBox);

    // 内容区
    const body = document.createElement('div');
    body.className = 'todo-body';

    const textSpan = document.createElement('span');
    textSpan.className = 'todo-text';
    textSpan.textContent = todo.text;
    textSpan.title = '双击编辑';

    // meta 徽章
    const meta = document.createElement('div');
    meta.className = 'todo-meta';

    if (todo.priority) {
      const chip = document.createElement('span');
      chip.className = `pri-chip ${todo.priority}`;
      chip.textContent = { high:'高', mid:'中', low:'低' }[todo.priority] || todo.priority;
      meta.appendChild(chip);
    }
    if (todo.due_date) {
      const badge = document.createElement('span');
      const ov = isOverdue(todo), ds = isDueSoon(todo);
      badge.className = 'meta-badge' + (ov?' overdue':ds?' due-soon':'');
      badge.textContent = '📅 ' + todo.due_date + (ov?' · 已逾期':ds?' · 即将到期':'');
      meta.appendChild(badge);
    }
    // 标签 chips
    for (const tag of (todo.tags || [])) {
      const chip = document.createElement('span');
      chip.className = 'tag-chip' + (tag === tagFilter ? ' active' : '');
      chip.textContent = '#' + tag;
      chip.dataset.tag = tag;
      chip.addEventListener('click', e => { e.stopPropagation(); setTagFilter(tag === tagFilter ? '' : tag); });
      meta.appendChild(chip);
    }

    body.append(textSpan, meta);

    // 备注区
    if (todo.notes) {
      const notesWrap = document.createElement('div');
      const notesToggle = document.createElement('button');
      notesToggle.className = 'notes-toggle-btn';
      notesToggle.textContent = '📝 备注 ▸';
      const notesContent = document.createElement('div');
      notesContent.className = 'todo-notes';
      notesContent.textContent = todo.notes;
      notesToggle.addEventListener('click', e => {
        e.stopPropagation();
        const open = notesContent.classList.toggle('show');
        notesToggle.textContent = open ? '📝 备注 ▾' : '📝 备注 ▸';
      });
      notesWrap.append(notesToggle, notesContent);
      body.appendChild(notesWrap);
    }

    // ── 分步走 ──
    const steps = todo.steps || [];
    const stepsDone  = steps.filter(s => s.completed).length;
    const stepsTotal = steps.length;
    const stepsOpen  = openSteps.has(todo.id);

    const stepsToggleRow = document.createElement('div');
    stepsToggleRow.className = 'steps-toggle-row';

    // 切换按钮
    const stepsToggleBtn = document.createElement('button');
    stepsToggleBtn.className = 'steps-toggle-btn' + (stepsOpen ? ' open' : '');
    stepsToggleBtn.innerHTML =
      `<span class="arrow">▶</span>分步走${stepsTotal > 0 ? ' ('+stepsTotal+')' : ''}`;

    // 迷你进度环（只在有步骤时显示）
    if (stepsTotal > 0) {
      const circ = 51; // 2π×r ≈ 2×3.14159×8.1 ≈ 50.9
      const offset = circ - (circ * stepsDone / stepsTotal);
      const allDone = stepsDone === stepsTotal;
      const miniWrap = document.createElement('div');
      miniWrap.className = 'mini-ring-wrap';
      miniWrap.innerHTML = `
        <svg class="mini-ring-svg" width="20" height="20" viewBox="0 0 20 20">
          <circle class="mini-ring-bg"   cx="10" cy="10" r="8.1"/>
          <circle class="mini-ring-fill${allDone?' done':''}" cx="10" cy="10" r="8.1"
            style="stroke-dashoffset:${offset.toFixed(1)}"/>
        </svg>
        <span class="mini-ring-label${allDone?' done':''}">${stepsDone}/${stepsTotal}</span>`;
      stepsToggleRow.appendChild(miniWrap);
    }
    stepsToggleRow.insertBefore(stepsToggleBtn, stepsToggleRow.firstChild);
    body.appendChild(stepsToggleRow);

    // 步骤面板
    const stepsPanel = document.createElement('div');
    stepsPanel.className = 'steps-panel' + (stepsOpen ? ' open' : '');
    stepsPanel.appendChild(buildStepsPanel(todo));
    body.appendChild(stepsPanel);

    stepsToggleBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (openSteps.has(todo.id)) openSteps.delete(todo.id);
      else openSteps.add(todo.id);
      stepsToggleBtn.classList.toggle('open');
      stepsPanel.classList.toggle('open');
    });

    // 删除按钮
    const actions = document.createElement('div');
    actions.className = 'item-actions';
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '删除';
    actions.appendChild(del);

    li.append(cbWrap, body, actions);
    frag.appendChild(li);

    /* 事件绑定 */
    // 完成切换 — 乐观更新
    cb.addEventListener('change', () => {
      todo.completed = cb.checked;
      render();
      updateTodoApi(todo.id, { completed: cb.checked });
    });

    // 双击编辑
    textSpan.addEventListener('dblclick', () => startEdit(li, todo, textSpan));

    // 删除
    del.addEventListener('click', e => { e.stopPropagation(); confirmDelete(todo.id, todo.text); });

    // 长按多选（600ms）
    let pressTimer;
    li.addEventListener('pointerdown', e => {
      if (e.target.closest('.cb-wrap') || e.target.closest('.del-btn')) return;
      pressTimer = setTimeout(() => toggleSelect(todo.id), 600);
    });
    li.addEventListener('pointerup',    () => clearTimeout(pressTimer));
    li.addEventListener('pointerleave', () => clearTimeout(pressTimer));
    // 多选模式下单击切换
    li.addEventListener('click', e => {
      if (selected.size > 0 && !e.target.closest('.cb-wrap') && !e.target.closest('.del-btn')) {
        clearTimeout(pressTimer);
        toggleSelect(todo.id);
      }
    });

    // 拖拽排序
    li.addEventListener('dragstart', e => {
      dragSrc = todo.id; li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    li.addEventListener('dragend', () => {
      dragSrc = null; li.classList.remove('dragging');
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    });
    li.addEventListener('dragover',  e => { e.preventDefault(); li.classList.add('drag-over'); });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      if (dragSrc && dragSrc !== todo.id) swapTodos(dragSrc, todo.id);
    });
  }

  todoList.appendChild(frag);
  updateBatchBar();
  renderTagFilterBar();
}

/* ── 分步走面板构建 ──────────────────────────────────── */
function buildStepsPanel(todo) {
  const frag = document.createDocumentFragment();
  const steps = todo.steps || [];

  // 步骤列表
  const list = document.createElement('div');
  list.className = 'step-list';

  if (!steps.length) {
    const empty = document.createElement('div');
    empty.className = 'step-empty';
    empty.textContent = '还没有小目标，在下方添加第一个吧 ✨';
    list.appendChild(empty);
  } else {
    for (const step of steps) {
      list.appendChild(buildStepItem(todo, step));
    }
  }
  frag.appendChild(list);

  // 添加表单
  const form = document.createElement('div');
  form.className = 'step-add-form';

  const inp = document.createElement('input');
  inp.className = 'step-add-input';
  inp.type = 'text';
  inp.placeholder = '输入小目标…';
  inp.maxLength = 200;
  inp.autocomplete = 'off';

  const dateInp = document.createElement('input');
  dateInp.className = 'step-add-date';
  dateInp.type = 'date';

  const addBtn = document.createElement('button');
  addBtn.className = 'step-add-btn';
  addBtn.textContent = '+ 添加';

  form.append(inp, dateInp, addBtn);
  frag.appendChild(form);

  async function doAdd() {
    const text = inp.value.trim();
    if (!text) { inp.focus(); return; }
    addBtn.disabled = true;
    addBtn.textContent = '添加中…';
    try {
      const res = await fetch(`${API}/${todo.id}/steps`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, due_date: dateInp.value || null })
      });
      if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error((e&&e.error)||`HTTP ${res.status}`); }
      const newStep = await res.json();
      if (!todo.steps) todo.steps = [];
      todo.steps.push(newStep);
      inp.value = ''; dateInp.value = '';
      // 局部刷新：重建列表区域
      rebuildStepsPanel(todo);
    } catch (err) {
      notify('添加步骤失败：' + err.message);
    } finally {
      addBtn.disabled = false;
      addBtn.textContent = '+ 添加';
    }
  }

  addBtn.addEventListener('click', doAdd);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });

  const container = document.createElement('div');
  container.appendChild(frag);
  return container;
}

function buildStepItem(todo, step) {
  const item = document.createElement('div');
  item.className = 'step-item' + (step.completed ? ' done' : '');
  item.dataset.stepId = step.id;

  // 复选框
  const cbWrap = document.createElement('label');
  cbWrap.className = 'step-cb-wrap';
  const cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = step.completed;
  const cbBox = document.createElement('span');
  cbBox.className = 'step-cb-box';
  cbWrap.append(cb, cbBox);

  // 内容
  const body = document.createElement('div');
  body.className = 'step-body';

  const textEl = document.createElement('span');
  textEl.className = 'step-text';
  textEl.textContent = step.text;
  textEl.title = '双击编辑';

  body.appendChild(textEl);

  if (step.due_date) {
    const dueEl = document.createElement('span');
    const ov = step.due_date < todayStr() && !step.completed;
    const ds = !step.completed && !ov && (() => {
      const diff = (new Date(step.due_date) - new Date(todayStr())) / 86400000;
      return diff >= 0 && diff <= 2;
    })();
    dueEl.className = 'step-due' + (ov ? ' overdue' : ds ? ' due-soon' : '');
    dueEl.textContent = '📅 ' + step.due_date + (ov ? ' · 逾期' : ds ? ' · 即将' : '');
    body.appendChild(dueEl);
  }

  // 删除按钮
  const delBtn = document.createElement('button');
  delBtn.className = 'step-del-btn';
  delBtn.textContent = '×';
  delBtn.title = '删除步骤';

  item.append(cbWrap, body, delBtn);

  // 事件
  cb.addEventListener('change', async () => {
    step.completed = cb.checked;
    item.classList.toggle('done', cb.checked);
    rebuildMiniRing(todo);
    try {
      await fetch(`${API}/${todo.id}/steps/${step.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: cb.checked })
      });
    } catch (err) {
      step.completed = !cb.checked;
      cb.checked = step.completed;
      item.classList.toggle('done', step.completed);
      notify('同步失败：' + err.message);
    }
  });

  textEl.addEventListener('dblclick', () => startStepEdit(todo, step, item, textEl));

  delBtn.addEventListener('click', async () => {
    item.style.opacity = '.4';
    try {
      const res = await fetch(`${API}/${todo.id}/steps/${step.id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      todo.steps = (todo.steps || []).filter(s => s.id !== step.id);
      rebuildStepsPanel(todo);
    } catch (err) {
      item.style.opacity = '';
      notify('删除失败：' + err.message);
    }
  });

  return item;
}

function startStepEdit(todo, step, item, textEl) {
  const input = document.createElement('input');
  input.className = 'step-edit-input';
  input.value = step.text;
  textEl.replaceWith(input);
  input.focus(); input.select();

  async function commit() {
    const t = input.value.trim();
    if (!t || t === step.text) { input.replaceWith(textEl); return; }
    if (t.length > 200) { notify('步骤过长', 'warning'); input.replaceWith(textEl); return; }
    try {
      const res = await fetch(`${API}/${todo.id}/steps/${step.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: t })
      });
      if (!res.ok) throw new Error();
      step.text = t; textEl.textContent = t;
    } catch { notify('更新失败', 'warning'); }
    input.replaceWith(textEl);
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.removeEventListener('blur', commit); commit(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); input.replaceWith(textEl); }
  });
}

// 局部重绘步骤面板（不触发整体 render，更流畅）
function rebuildStepsPanel(todo) {
  const li = todoList.querySelector(`[data-id="${todo.id}"]`);
  if (!li) return;
  const panel = li.querySelector('.steps-panel');
  const toggleBtn = li.querySelector('.steps-toggle-btn');
  if (!panel) return;

  // 重建面板内容
  panel.innerHTML = '';
  panel.appendChild(buildStepsPanel(todo));

  // 更新按钮标题
  const n = (todo.steps || []).length;
  if (toggleBtn) {
    const arrowHtml = '<span class="arrow">▶</span>';
    toggleBtn.innerHTML = arrowHtml + '分步走' + (n > 0 ? ' (' + n + ')' : '');
  }

  // 更新迷你进度环
  rebuildMiniRing(todo);
}

// 只更新迷你进度环，极轻量
function rebuildMiniRing(todo) {
  const li = todoList.querySelector(`[data-id="${todo.id}"]`);
  if (!li) return;
  const steps = todo.steps || [];
  const total = steps.length;
  const done  = steps.filter(s => s.completed).length;
  const row   = li.querySelector('.steps-toggle-row');
  if (!row) return;

  let miniWrap = row.querySelector('.mini-ring-wrap');
  if (total === 0) { if (miniWrap) miniWrap.remove(); return; }

  const circ = 51;
  const offset = circ - (circ * done / total);
  const allDone = done === total;

  if (!miniWrap) {
    miniWrap = document.createElement('div');
    miniWrap.className = 'mini-ring-wrap';
    row.appendChild(miniWrap);
  }
  miniWrap.innerHTML = `
    <svg class="mini-ring-svg" width="20" height="20" viewBox="0 0 20 20">
      <circle class="mini-ring-bg"   cx="10" cy="10" r="8.1"/>
      <circle class="mini-ring-fill${allDone?' done':''}" cx="10" cy="10" r="8.1"
        style="stroke-dashoffset:${offset.toFixed(1)}"/>
    </svg>
    <span class="mini-ring-label${allDone?' done':''}">${done}/${total}</span>`;
}

/* ── 标签过滤栏 ─────────────────────────────────────── */
function renderTagFilterBar() {
  const bar = document.getElementById('tagFilterBar');
  const allTags = {};
  for (const t of allTodos) {
    for (const tag of (t.tags || [])) {
      allTags[tag] = (allTags[tag] || 0) + 1;
    }
  }
  const tags = Object.entries(allTags).sort((a, b) => b[1] - a[1]);
  if (!tags.length) { bar.style.display = 'none'; return; }

  bar.style.display = 'flex';
  bar.innerHTML = '';
  const lbl = document.createElement('span');
  lbl.style.cssText = 'font-size:.72rem;color:var(--text2);font-family:JetBrains Mono,monospace;flex-shrink:0';
  lbl.textContent = '标签：';
  bar.appendChild(lbl);

  if (tagFilter) {
    const clearBtn = document.createElement('div');
    clearBtn.className = 'filter-tab active';
    clearBtn.style.borderRadius = '20px';
    clearBtn.textContent = '#' + tagFilter + ' ✕';
    clearBtn.addEventListener('click', () => setTagFilter(''));
    bar.appendChild(clearBtn);
  }
  for (const [tag, cnt] of tags) {
    const chip = document.createElement('div');
    chip.className = 'filter-tab' + (tag === tagFilter ? ' active' : '');
    chip.textContent = `#${tag} (${cnt})`;
    chip.addEventListener('click', () => setTagFilter(tag === tagFilter ? '' : tag));
    bar.appendChild(chip);
  }
}

function setTagFilter(tag) {
  tagFilter = tag;
  render();
}

function animateStat(el, val) {
  if (el.textContent === String(val)) return;
  el.textContent = val;
  el.style.transition = 'none'; el.style.transform = 'scale(1.2)';
  requestAnimationFrame(() => { el.style.transition = 'transform .2s'; el.style.transform = 'scale(1)'; });
}

/* ── 行内编辑 ─────────────────────────────────────────── */
function startEdit(li, todo, span) {
  const input = document.createElement('input');
  input.className = 'edit-input';
  input.value = todo.text;
  span.replaceWith(input);
  input.focus(); input.select();

  async function commit() {
    const t = input.value.trim();
    if (!t)          { render(); return; }
    if (t.length > 500) { notify('文本过长','warning'); render(); return; }
    if (t !== todo.text) {
      todo.text = t; render();
      await updateTodoApi(todo.id, { text: t });
    } else { render(); }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.removeEventListener('blur', commit); commit(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); render(); }
  });
}

/* ── 多选 ─────────────────────────────────────────────── */
function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  // 直接切换 class 而不是整体重渲，更流畅
  const li = todoList.querySelector(`[data-id="${id}"]`);
  if (li) li.classList.toggle('multi-sel', selected.has(id));
  updateBatchBar();
}
function updateBatchBar() {
  batchBar.classList.toggle('show', selected.size > 0);
  batchLabel.textContent = `已选 ${selected.size} 项`;
}
function clearSelection() { selected.clear(); render(); }

/* ── 拖拽排序 ─────────────────────────────────────────── */
function swapTodos(srcId, dstId) {
  const si = allTodos.findIndex(t => t.id === srcId);
  const di = allTodos.findIndex(t => t.id === dstId);
  if (si < 0 || di < 0) return;
  [allTodos[si], allTodos[di]] = [allTodos[di], allTodos[si]];
  render();
  // 仅在"添加顺序"排序时才持久化拖拽结果
  if (sortBy === 'created') {
    fetch(`${API}/reorder`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order: allTodos.map(t => t.id) })
    }).catch(() => {});
  }
}

/* ── API ─────────────────────────────────────────────── */
async function loadTodos() {
  setLoading(true);
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allTodos = await res.json();
    allTodos.forEach(t => {
      t.priority = t.priority || 'mid';
      t.due_date = t.due_date || null;
      t.notes    = t.notes    || '';
      t.tags     = t.tags     || [];
      t.steps    = t.steps    || [];
    });
    render();
  } catch (err) {
    notify('加载失败：' + err.message);
  } finally {
    setLoading(false);
  }
}

async function addTodo() {
  const text = addInput.value.trim();
  if (!text) { notify('请输入待办事项内容', 'warning'); addInput.focus(); return; }
  if (text.length > 500) { notify('文本过长（最大 500 字符）', 'warning'); return; }

  const due = dueDateInput.value || null;
  const notes = (document.getElementById('notesInput').value || '').trim();
  const tagsRaw = (document.getElementById('tagsInput').value || '').trim();
  const tags = tagsRaw ? tagsRaw.split(/[\s,，]+/).map(s => s.replace(/^#/, '').trim()).filter(Boolean) : [];
  const payload = { text, priority: selectedPri, due_date: due, notes, tags };

  // ── 乐观插入（立刻显示，不等网络）──
  const tempId = -Date.now();
  const optimistic = { id: tempId, text, completed: false, priority: selectedPri, due_date: due, notes, tags, steps: [] };
  allTodos.unshift(optimistic);
  addInput.value = '';
  document.getElementById('notesInput').value = '';
  document.getElementById('tagsInput').value = '';
  document.getElementById('notesRow').classList.remove('open');
  document.getElementById('toggleNotesBtn').textContent = '+ 备注';
  const aiStepsToAdd = pendingAiSteps.filter(s => s.selected && s.text.trim());
  clearAiPanel();
  render();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error((e&&e.error)||`HTTP ${res.status}`); }
    const real = await res.json();
    // 替换临时条目为服务器返回的真实数据
    const idx = allTodos.findIndex(t => t.id === tempId);
    if (idx >= 0) allTodos[idx] = { priority: selectedPri, due_date: due, notes, tags, ...real };

    // ── 附加 AI 建议步骤 ──
    if (aiStepsToAdd.length > 0) {
      const todo = allTodos.find(t => t.id === real.id);
      for (const step of aiStepsToAdd) {
        try {
          const sr = await fetch(`${API}/${real.id}/steps`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: step.text.trim() })
          });
          if (sr.ok && todo) {
            const newStep = await sr.json();
            if (!todo.steps) todo.steps = [];
            todo.steps.push(newStep);
          }
        } catch {}
      }
      openSteps.add(real.id);
    }

    render();
    notify('添加成功！', 'success', 2000);
    addInput.focus();
  } catch (err) {
    // 回滚乐观插入
    allTodos = allTodos.filter(t => t.id !== tempId);
    addInput.value = text;
    render();
    notify('添加失败：' + err.message);
  }
}

async function updateTodoApi(id, updates) {
  try {
    const res = await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!res.ok) { const e = await res.json().catch(()=>{}); throw new Error((e&&e.error)||`HTTP ${res.status}`); }
  } catch (err) {
    notify('同步失败，正在重新加载…', 'warning');
    await loadTodos();
  }
}

function confirmDelete(id, text) {
  deleteTodoWithUndo(id);
}

function deleteTodoWithUndo(id) {
  const todo = allTodos.find(t => t.id === id);
  if (!todo) return;

  // 如果已有相同 id 的待删，取消之前的
  if (pendingDeletes.has(id)) {
    clearTimeout(pendingDeletes.get(id).timer);
    pendingDeletes.get(id).el?.remove();
    pendingDeletes.delete(id);
  }

  // 乐观移除
  allTodos = allTodos.filter(t => t.id !== id);
  selected.delete(id);
  render();

  // 创建撤销通知
  const label = todo.text.length > 20 ? todo.text.slice(0, 20) + '…' : todo.text;
  const d = document.createElement('div');
  d.className = 'notice warning';
  d.style.display = 'flex'; d.style.alignItems = 'center'; d.style.gap = '10px';
  d.innerHTML = `<span>已删除「${label}」</span>`;
  const undoBtn = document.createElement('button');
  undoBtn.className = 'btn-ghost';
  undoBtn.style.cssText = 'padding:3px 10px;font-size:.75rem;flex-shrink:0';
  undoBtn.textContent = '撤销';
  const nx = document.createElement('span');
  nx.className = 'nx'; nx.textContent = '✕';
  d.append(undoBtn, nx);

  const timer = setTimeout(async () => {
    d.style.transition = 'opacity .4s'; d.style.opacity = '0';
    setTimeout(() => d.remove(), 400);
    pendingDeletes.delete(id);
    try {
      const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
    } catch (err) {
      allTodos.push(todo); render();
      notify('删除失败，已恢复：' + err.message);
    }
  }, 5000);

  undoBtn.onclick = () => {
    clearTimeout(timer);
    d.remove();
    pendingDeletes.delete(id);
    allTodos.push(todo);
    render();
    notify('已撤销删除', 'success', 1500);
  };
  nx.onclick = () => {
    clearTimeout(timer);
    d.remove();
    pendingDeletes.delete(id);
    fetch(`${API}/${id}`, { method: 'DELETE' }).catch(() => {});
  };

  noticeArea.prepend(d);
  pendingDeletes.set(id, { todo, timer, el: d });
}

async function deleteTodoApi(id) {
  deleteTodoWithUndo(id);
}

async function clearCompleted() {
  const done = allTodos.filter(t => t.completed);
  if (!done.length) { notify('没有已完成的待办事项', 'warning'); return; }
  if (!confirm(`确认清除 ${done.length} 条已完成的待办事项？`)) return;
  const backup = allTodos.slice();
  allTodos = allTodos.filter(t => !t.completed);
  render();
  try {
    await Promise.all(done.map(t => fetch(`${API}/${t.id}`, { method: 'DELETE' })));
    notify(`已清除 ${done.length} 条`, 'success');
  } catch (err) {
    allTodos = backup; render();
    notify('清除失败：' + err.message);
  }
}

async function exportTodos() {
  try {
    const res = await fetch(`${API}/export`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), {
      href: url, download: `todos_${todayStr()}.xlsx`
    });
    document.body.append(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    notify('导出成功！', 'success', 2000);
  } catch (err) { notify('导出失败：' + err.message); }
}
